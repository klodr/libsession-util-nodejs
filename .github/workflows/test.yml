name: libession-util-nodejs build test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, macos-15-intel, macos-14, ubuntu-24.04]
    env:
      SIGNAL_ENV: production
    steps:
      - run: git config --global core.autocrlf false

      - name: Checkout git repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          submodules: "recursive"

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2
        with:
          key: ${{ matrix.os }}-ccache-libsession-util-nodejs-${{ github.head_ref || github.ref_name }}
          # if the exact key is not found, fallback to one matching our cache_suffix
          restore-keys: ${{ matrix.os }}-ccache-libsession-util-nodejs-

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4

      - name: Setup pnpm hoisted node-linker (Windows Only)
        if: runner.os == 'Windows'
        shell: bash
        run: pnpm config set node-linker hoisted

      - name: Setup node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install correct clang versions
        if: runner.os == 'Linux'
        run: sudo apt update && sudo apt search clang && sudo apt install clang-format-19
        shell: bash

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@6fb02220983dee41ce7ae257b6f4d8f9bf5ed4ce # v2.0.0
        if: runner.os == 'Windows'

      - name: build libsession-util-nodejs
        shell: bash
        run: pnpm install --frozen-lockfile
        env:
          CMAKE_C_COMPILER_LAUNCHER: ccache
          CMAKE_CXX_COMPILER_LAUNCHER: ccache

      - name: Check formatting
        if: runner.os == 'Linux'
        run: clang-format-19 --dry-run --Werror src/*.cpp include/*.hpp src/**/*.cpp include/**/*.hpp
        shell: bash

      - name: Ensure pnpm-lock.yaml has no duplicates
        run: pnpm dedupe --check

      - name: R14 sentinel — ENABLE_NETWORKING must stay OFF
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # See docs/V2_PHASE1_FORK.md R14 in klodr/session-messenger.
          # Flipping ENABLE_NETWORKING to ON would re-activate the
          # build_external() path that downloads from oxen.rocks/deps
          # for gmp/openssl/etc — a supply-chain surface this fork
          # intentionally avoids. Any change here requires explicit
          # crypto review and updating both the R14 section and this
          # sentinel.
          if ! grep -q '^set(ENABLE_NETWORKING OFF)' CMakeLists.txt; then
            echo "::error file=CMakeLists.txt::ENABLE_NETWORKING is no longer pinned OFF (R14 sentinel)."
            exit 1
          fi
          if ! grep -q -- '--CDENABLE_NETWORKING=OFF' package.json; then
            echo "::error file=package.json::install script no longer passes --CDENABLE_NETWORKING=OFF (R14 sentinel)."
            exit 1
          fi

      - name: Run JS round-trip tests (vitest)
        # First JS test surface for the binding. Pins the
        # MultiEncryptWrapperNode contract (assert_length on
        # ed25519PrivateKeyHex/proBackendPubkeyHex, encryptFor1o1
        # output shape, etc.) so a future C++ change that breaks the
        # JS interface trips a red CI instead of silently shipping a
        # broken consumer install. See tests/.
        run: pnpm test

      - name: Validate formatting & linting changed no files
        run: git diff --exit-code
